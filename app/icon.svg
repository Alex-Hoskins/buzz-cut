<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Diagonal stripe pattern: red / cream / navy -->
    <pattern id="s" width="24" height="24"
             patternUnits="userSpaceOnUse"
             patternTransform="rotate(-45 32 32)">
      <rect width="9"  height="24" fill="#dc2626"/>
      <rect x="9"  width="8" height="24" fill="#fef3e7"/>
      <rect x="17" width="7" height="24" fill="#0f2942"/>
    </pattern>
    <!-- Cylindrical shading: darker on both vertical edges -->
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#000" stop-opacity="0.30"/>
      <stop offset="0.22" stop-color="#000" stop-opacity="0"/>
      <stop offset="0.78" stop-color="#000" stop-opacity="0"/>
      <stop offset="1"    stop-color="#000" stop-opacity="0.30"/>
    </linearGradient>
  </defs>

  <!-- App-icon background -->
  <rect width="64" height="64" rx="13" fill="#fef3e7"/>

  <!-- Pole body — rx=14 = width/2, so top & bottom are perfect semicircles -->
  <rect x="18" y="5" width="28" height="54" rx="14" fill="url(#s)"/>

  <!-- 3-D cylinder shading -->
  <rect x="18" y="5" width="28" height="54" rx="14" fill="url(#g)"/>

  <!-- Outline -->
  <rect x="18" y="5" width="28" height="54" rx="14"
        fill="none" stroke="#0f2942" stroke-width="2.5"/>
</svg>
